pattern:
  id: billing-overview
  register: product
  purpose: "Show subscription, payment, invoice, and usage information"
  layout:
    default_structure: summary-sections
    density: medium
  required_regions:
    - plan-summary
    - payment-method
    - invoice-list
  optional_regions:
    - usage-summary
    - upgrade-action
    - billing-contact
  components:
    recommended:
      - section-header
      - badge
      - table
      - button
      - form-field
  usage:
    use_when:
      - "Workspace admins need to understand billing state"
      - "Payment and invoice actions are grouped together"
    avoid_when:
      - "The surface is a public pricing page"
  avoid:
    - "pricing landing layout inside app settings"
    - "fake savings metrics"
    - "unclear destructive billing actions"

