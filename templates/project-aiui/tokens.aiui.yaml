tokens:
  spacing:
    xs: 4
    sm: 8
    md: 16
    lg: 24
    xl: 32
    xxl: 48

  radius:
    sm: 6
    md: 10
    lg: 14

  typography:
    display:
      size: 40
      line_height: 1.1
      weight: 700
    h1:
      size: 30
      line_height: 1.2
      weight: 650
    h2:
      size: 22
      line_height: 1.25
      weight: 650
    body:
      size: 16
      line_height: 1.5
      weight: 400
    small:
      size: 13
      line_height: 1.45
      weight: 400

  surfaces:
    page:
      role: "main background"
    panel:
      role: "grouped product content"
    elevated:
      role: "temporary overlay or focused detail"

  motion:
    default:
      duration_ms: 160
      easing: ease-out

